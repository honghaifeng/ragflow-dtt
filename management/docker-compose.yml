services:
  management-frontend:
    container_name: ragflowdtt-management-frontend
    image: zstar1003/ragflowplus-management-web:v0.5.0
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "8888:80"
    depends_on:
      - management-backend
    environment:
      - API_BASE_URL=/api
    networks:
      - ragflow_net

  management-backend:
    container_name: ragflowdtt-management-backend
    build:
      context: .
      dockerfile: Dockerfile.light
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - CORS_ALLOWED_ORIGINS=http://frontend
      - MANAGEMENT_ADMIN_USERNAME=${MANAGEMENT_ADMIN_USERNAME:-admin}
      - MANAGEMENT_ADMIN_PASSWORD=${MANAGEMENT_ADMIN_PASSWORD:-12345678}
      - MANAGEMENT_JWT_SECRET=${MANAGEMENT_JWT_SECRET:-12345678}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ragflow_net

networks:
  ragflow_net:
    external: true
    name: docker_ragflow